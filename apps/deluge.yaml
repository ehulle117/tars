apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deluge-config-pvc
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path 
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deluge
  namespace: apps
  labels:
    app: deluge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deluge
  strategy:
    type: Recreate 
  template:
    metadata:
      labels:
        app: deluge
    spec:
      containers:
        # VPN Container (Gluetun)
        - name: gluetun
          image: qmcgaw/gluetun:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          ports:
            - containerPort: 8112
              name: web
            - containerPort: 58846
              name: daemon
            - containerPort: 58946
              name: bt-tcp
            - containerPort: 58946
              protocol: UDP
              name: bt-udp
            - containerPort: 8888
              name: httpproxy
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "private internet access"
            - name: VPN_TYPE
              value: "openvpn"
            - name: SERVER_REGIONS
              value: "Netherlands"
            - name: HTTPPROXY
              value: "on"
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: vpn-auth
                  key: user
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vpn-auth
                  key: pass
          volumeMounts:
            - name: gluetun-config
              mountPath: /gluetun

        # Deluge Container
        - name: deluge
          image: lscr.io/linuxserver/deluge:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: deluge-config-pvc
        - name: gluetun-config
          emptyDir: {}
        - name: media
          persistentVolumeClaim:
            claimName: nfs-media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: deluge-svc
  namespace: apps
spec:
  type: LoadBalancer
  selector:
    app: deluge
  ports:
    - name: web
      protocol: TCP
      port: 8112
      targetPort: 8112
    - name: daemon
      protocol: TCP
      port: 58846
      targetPort: 58846
    - name: bittorrent-tcp
      protocol: TCP
      port: 58946
      targetPort: 58946
    - name: bittorrent-udp
      protocol: UDP
      port: 58946
      targetPort: 58946
    - name: httpproxy
      protocol: TCP
      port: 8888
      targetPort: 8888
